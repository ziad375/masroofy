<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masroofy – {% block title %}{% endblock %}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#333}
    nav{background:#1a73e8;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
    nav a{color:#fff;text-decoration:none;margin-left:18px;font-weight:500}
    nav .brand{font-size:1.3rem;font-weight:700;color:#fff}
    .container{max-width:900px;margin:32px auto;padding:0 16px}
    .card{background:#fff;border-radius:12px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
    h1,h2{margin-bottom:18px;color:#1a73e8}
    .btn{display:inline-block;padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem;font-weight:600;text-decoration:none}
    .btn-primary{background:#1a73e8;color:#fff}
    .btn-danger{background:#e53935;color:#fff}
    .btn-success{background:#43a047;color:#fff}
    .btn-secondary{background:#9e9e9e;color:#fff}
    .btn:hover{opacity:.88}
    .form-group{margin-bottom:16px}
    label{display:block;font-weight:600;margin-bottom:6px}
    input,select{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:.95rem}
    input:focus,select:focus{outline:none;border-color:#1a73e8}
    .messages{margin-bottom:16px}
    .alert{padding:12px 16px;border-radius:8px;margin-bottom:8px}
    .alert-success{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
    .alert-error{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
    .alert-warning{background:#fff8e1;color:#f57f17;border:1px solid #ffe082}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px 14px;text-align:left;border-bottom:1px solid #eee}
    th{background:#f5f7fa;font-weight:600;color:#555}
    tr:hover{background:#fafafa}
    .badge{padding:4px 10px;border-radius:20px;font-size:.8rem;font-weight:600}
    .badge-income{background:#e8f5e9;color:#2e7d32}
    .badge-expense{background:#ffebee;color:#c62828}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
    .stat-card{background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07)}
    .stat-card .value{font-size:1.8rem;font-weight:700;color:#1a73e8}
    .stat-card .label{color:#777;font-size:.9rem;margin-top:4px}
    .budget-bar{background:#eee;border-radius:6px;height:10px;margin-top:6px}
    .budget-fill{height:10px;border-radius:6px;background:#1a73e8;transition:width .3s}
    .budget-fill.exceeded{background:#e53935}
  </style>
</head>
<body>
{% if user.is_authenticated %}
<nav>
  <span class="brand">💰 Masroofy</span>
  <div>
    <a href="/">Dashboard</a>
    <a href="/history/">History</a>
    <a href="/expense/add/">+ Expense</a>
    <a href="/income/add/">+ Income</a>
    <a href="/budget/set/">Budget</a>
    <a href="/logout/">Logout ({{ user.first_name }})</a>
  </div>
</nav>
{% endif %}
<div class="container">
  {% if messages %}
  <div class="messages">
    {% for msg in messages %}
    <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
    {% endfor %}
  </div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
